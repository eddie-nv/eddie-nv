name: Generate 3D Contrib

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: eddie-nv
          BACKGROUND: "#00000000"

      - name: Strip footer stats text
        run: |
          cd profile-3d-contrib
          for f in *.svg; do
            sed -i -E '/<text[^>]*>[^<]*(Total|Stars?|Forks?|Followers?|Repositories?|Contributions?)[^<]*<\/text>/d' "$f"
          done

      - uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output-3d
          build_dir: profile-3d-contrib
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
